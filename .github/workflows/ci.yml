name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (poppler for pdf2image)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: |
          pip install --timeout 300 -r requirements-dev.txt

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint check
        run: ruff check .

      - name: Pytest with coverage
        run: pytest --cov=app --cov-fail-under=80 --cov-report=term

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t df-ocr:latest .
